name: Deploy to Apps Script

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install clasp
        run: npm install -g @google/clasp@2.4.2

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Create Lol.js from secrets
        run: |
          printf "// Telegram\n" > Lol.js
          printf "const BOT_TOKEN = \"${{ secrets.BOT_TOKEN }}\";\n" >> Lol.js
          printf "const GROUP_CHAT_ID = \"${{ secrets.GROUP_CHAT_ID }}\";\n\n" >> Lol.js
          printf "const SCRIPT_APP_URL = \"${{ secrets.SCRIPT_APP_URL }}\";\n\n" >> Lol.js
          printf "const WORKER_PROXY_URL = \"${{ secrets.WORKER_PROXY_URL }}\";\n\n" >> Lol.js
          printf "// Google Sheets\n" >> Lol.js
          printf "const PROD_SHEET_ID = \"${{ secrets.PROD_SHEET_ID }}\";\n" >> Lol.js
          printf "const SHEET_NAME = \"${{ secrets.SHEET_NAME }}\";\n\n" >> Lol.js
          printf "// Azure OpenAI\n" >> Lol.js
          printf "const AZURE_OPENAI_ENDPOINT = \"${{ secrets.AZURE_OPENAI_ENDPOINT }}\";\n" >> Lol.js
          printf "const AZURE_OPENAI_API_KEY = \"${{ secrets.AZURE_OPENAI_API_KEY }}\";\n" >> Lol.js
          printf "const AZURE_OPENAI_DEPLOYMENT_NAME = \"${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}\";\n" >> Lol.js
          printf "const AZURE_OPENAI_API_VERSION = \"${{ secrets.AZURE_OPENAI_API_VERSION }}\";\n\n" >> Lol.js
          printf "// Gemini\n" >> Lol.js
          printf "const GEMINI_BASE_URL = \"${{ secrets.GEMINI_BASE_URL }}\";\n" >> Lol.js
          printf "const GEMINI_API_KEY = \"${{ secrets.GEMINI_API_KEY }}\";\n" >> Lol.js

      - name: Set up authentication
        env:
          CLASP_TOKEN: ${{ secrets.CLASP_TOKEN }}
        run: |
          printf '%s' "$CLASP_TOKEN" > ~/.clasprc.json
          echo "File size: $(wc -c < ~/.clasprc.json) bytes"
          echo "Top-level keys:"
          node -e "const j=require(require('os').homedir()+'/.clasprc.json'); console.log(Object.keys(j)); if(j.tokens){console.log('tokens keys:', Object.keys(j.tokens)); if(j.tokens.default){console.log('default keys:', Object.keys(j.tokens.default));}}"

      - name: Push to Apps Script
        run: clasp push --force

      - name: Deploy new version
        run: clasp deploy --deploymentId ${{ secrets.DEPLOYMENT_ID }} -d "Auto deploy"

      - name: Deploy Cloudflare Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: "4.81.1"
          workingDirectory: worker
          secrets: |
            APPS_SCRIPT_URL
        env:
          APPS_SCRIPT_URL: ${{ secrets.SCRIPT_APP_URL }}
